const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

data.forEach((muscle, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = muscle.name + ' ' + muscle.en;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + muscle.id).classList.add('active');
  };
  tabsEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + muscle.id;

  let html = '';
  muscle.tiers.forEach((row, ri) => {
    if (ri > 0) html += '<hr class="divider">';
    html += `<div class="tier-row">
      <div class="tier-header">
        <span class="tier-label ${row.label}">${row.tier}</span>
      </div>
      <div class="tags">`;
    row.items.forEach(ex => {
      const cls = row.tier === 'S+' ? 'ex-tag highlight' : 'ex-tag';
      html += `<span class="${cls}"><span class="ex-zh">${ex.zh}</span><span class="ex-en">${ex.en}</span></span>`;
    });
    html += `</div>`;
    if (row.note) html += `<div class="note">${row.note}</div>`;
    html += `</div>`;
  });
  panel.innerHTML = html;
  panelsEl.appendChild(panel);
});
