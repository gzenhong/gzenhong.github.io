const groupKeys = [...new Set(data.map(d => d.g))];
const allGroups = ["全部 All", ...groupKeys];
let active = "全部 All";

function render() {
  const rows = active === "全部 All" ? data : data.filter(d => d.g === active);
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  if (!rows.length) { tbody.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  let html = "";
  rows.forEach(r => {
    const p = palette[r.g];
    const gParts = r.g.split(" ");
    const label = `<span class="group-label" style="background:${p.bg};color:${p.text};border:1px solid ${p.border}">${gParts[0]}<br><span style="font-weight:400;font-size:10px">${gParts.slice(1).join(" ")}</span></span>`;
    html += `<tr>
      <td>${label}</td>
      <td><div class="zh">${r.mZh}</div><div class="en">${r.mEn}</div></td>
      <td><div class="zh badge">${r.sZh}</div><div class="en" style="margin-top:2px">${r.sEn}</div></td>
      <td><div class="zh">${r.pZh}</div><div class="en">${r.pEn}</div></td>
      <td><div class="sec-zh">${r.xZh}</div><div class="en">${r.xEn}</div></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function buildFilters() {
  const el = document.getElementById("filters");
  allGroups.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (g === active ? " active" : "");
    const count = g === "全部 All" ? data.length : data.filter(d => d.g === g).length;
    const label = g === "全部 All" ? "全部 All" : g.split(" ")[0] + " " + g.split(" ").slice(1).join(" ");
    btn.innerHTML = label + `<span class="count">(${count})</span>`;
    btn.onclick = () => {
      active = g;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    el.appendChild(btn);
  });
}

buildFilters();
render();
</script>
