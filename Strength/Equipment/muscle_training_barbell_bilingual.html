* { box-sizing: border-box; }

tbody tr { border-bottom: 1px solid var(--color-border-tertiary); }
tbody tr:hover { background: var(--color-background-secondary); }
tbody td { padding: 6px 8px; vertical-align: top; line-height: 1.6; }
.group-label { font-weight: 500; font-size: 11px; padding: 2px 7px; border-radius: 4px; display: inline-block; white-space: nowrap; }
.badge { font-size: 11px; padding: 2px 6px; border-radius: 10px; display: inline-block; background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
.zh { font-weight: 500; color: var(--color-text-primary); }
.en { font-size: 11px; color: #A32D2D; }
.sec-zh { color: var(--color-text-secondary); font-weight: 400; }
.count { font-size: 11px; color: var(--color-text-tertiary); margin-left: 5px; }
#empty { display:none; text-align:center; padding:32px; color:var(--color-text-tertiary); font-size:13px; }
.note { font-size: 11px; color: var(--color-text-tertiary); font-style: italic; }

  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  if (!rows.length) { tbody.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  let html = "";
  rows.forEach(r => {
    const p = palette[r.g];
    const label = `<span class="group-label" style="background:${p.bg};color:${p.text};border:1px solid ${p.border}">${r.g.split(" ")[0]}<br><span style="font-weight:400;font-size:10px">${r.g.split(" ").slice(1).join(" ")}</span></span>`;
    html += `<tr>
      <td>${label}</td>
      <td><div class="zh">${r.mZh}</div><div class="en">${r.mEn}</div></td>
      <td><div class="zh badge">${r.sZh}</div><div class="en" style="margin-top:2px">${r.sEn}</div></td>
      <td><div class="zh">${r.pZh}</div><div class="en">${r.pEn}</div></td>
      <td><div class="sec-zh">${r.xZh}</div><div class="en">${r.xEn}</div></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function buildFilters() {
  const el = document.getElementById("filters");
  allGroups.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (g === active ? " active" : "");
    const count = g === "全部 All" ? data.length : data.filter(d => d.g === g).length;
    const label = g === "全部 All" ? "全部 All" : g.split(" ")[0] + " " + g.split(" ").slice(1).join(" ");
    btn.innerHTML = label + `<span class="count">(${count})</span>`;
    btn.onclick = () => {
      active = g;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    el.appendChild(btn);
  });
}

buildFilters();
render();
</script>
