<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff Nippard PPL — 肌肉動作索引</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--s1:#181818;--s2:#222;--s3:#2a2a2a;
  --border:#2e2e2e;--text:#e4e4e4;--muted:#888;--dim:#555;
  --legs:#22A55B;--push:#E07020;--pull:#3A9BDC;
  --info-bg:rgba(58,155,220,.12);--info-text:#3A9BDC;--info-border:rgba(58,155,220,.35);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',system-ui,sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}

/* ── HEADER ── */
.header{padding:28px 28px 20px;border-bottom:1px solid var(--border);}
.header h1{font-size:22px;font-weight:500;letter-spacing:1px;margin-bottom:4px;}
.header p{font-size:12px;color:var(--muted);}

/* ── FILTER PANEL ── */
.filters{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-label{font-size:11px;color:var(--muted);min-width:46px;letter-spacing:.5px;}
.pill{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:transparent;
  color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{color:var(--text);border-color:#555;}
.pill.on-session{background:rgba(34,165,91,.12);color:var(--legs);border-color:rgba(34,165,91,.4);}
.pill.session-L.on-session{background:rgba(34,165,91,.12);color:var(--legs);border-color:rgba(34,165,91,.4);}
.pill.session-P.on-session{background:rgba(224,112,32,.12);color:var(--push);border-color:rgba(224,112,32,.4);}
.pill.session-U.on-session{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border);}
.pill.on-mgroup{background:var(--s3);color:var(--text);border-color:#666;}
.pill.hidden-pill{display:none;}
.search-wrap{position:relative;margin-top:2px;}
.search-box{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;
  background:var(--s1);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
.search-box:focus{border-color:#555;}
.search-box::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none;}

/* ── CONTENT ── */
.content{padding:20px 28px 40px;}
.group-section{margin-bottom:1.5rem;}
.group-title{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.muscle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px;}

/* ── MUSCLE CARD ── */
.muscle-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.muscle-hd{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;user-select:none;transition:background .1s;}
.muscle-hd:hover{background:var(--s2);}
.muscle-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.muscle-name{font-size:13px;font-weight:500;flex:1;}
.ex-count{font-size:10px;color:var(--dim);margin-left:auto;margin-right:8px;white-space:nowrap;}
.chevron{font-size:10px;color:var(--dim);transition:transform .2s;}
.chevron.open{transform:rotate(90deg);}

/* ── EX LIST ── */
.ex-list{display:none;padding:0 13px 10px;}
.ex-list.open{display:block;}
.ex-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:5px;padding:8px 0;border-top:1px solid #1e1e1e;}
.ex-name{font-size:12px;flex:1;min-width:130px;line-height:1.4;}
.ex-zh{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
.role-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.role-pri{background:rgba(58,155,220,.12);color:#3A9BDC;border:1px solid rgba(58,155,220,.25);}
.role-sec{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.loc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;width:100%;}
.loc-tag{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;white-space:nowrap;}
.loc-L{border-color:rgba(34,165,91,.4);color:#22A55B;background:rgba(34,165,91,.07);}
.loc-P{border-color:rgba(224,112,32,.4);color:#E07020;background:rgba(224,112,32,.07);}
.loc-U{border-color:rgba(58,155,220,.4);color:#3A9BDC;background:rgba(58,155,220,.07);}

.empty{text-align:center;color:var(--dim);padding:3rem;font-size:13px;}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:12px 28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:0;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ld{width:6px;height:6px;border-radius:50%;}
</style>
</head>

<div class="header">
  <h1>Jeff Nippard PPL — 肌肉動作索引</h1>
  <p>以肌肉為主：每個肌肉對應的訓練動作 &amp; 所在 Block / Week / Day</p>
</div>

  <div class="li"><span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#2a2a2a;color:#888;border:1px solid #2e2e2e;">協同</span>&nbsp;協同肌群</div>
</div>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">訓練類</span>
    <button class="pill session-all on-session" data-f="session" data-v="all" onclick="setFilter(this)">全部</button>
    <button class="pill session-L" data-f="session" data-v="L" onclick="setFilter(this)">腿部</button>
    <button class="pill session-P" data-f="session" data-v="P" onclick="setFilter(this)">推系</button>
    <button class="pill session-U" data-f="session" data-v="U" onclick="setFilter(this)">拉系</button>
  </div>
  <div class="filter-row" id="mgroup-row">

    <button class="pill on-mgroup" data-f="mgroup" data-v="all" onclick="setFilter(this)">全部</button>
    <button class="pill" data-f="mgroup" data-v="chest"    data-sessions="P"     onclick="setFilter(this)">胸</button>

    <button class="pill" data-f="mgroup" data-v="shoulder" data-sessions="P,U"   onclick="setFilter(this)">肩</button>
    <button class="pill" data-f="mgroup" data-v="bicep"    data-sessions="U"     onclick="setFilter(this)">二頭</button>
    <button class="pill" data-f="mgroup" data-v="tricep"   data-sessions="P"     onclick="setFilter(this)">三頭</button>
    <button class="pill" data-f="mgroup" data-v="forearm"  data-sessions="U"     onclick="setFilter(this)">前臂</button>
    <button class="pill" data-f="mgroup" data-v="leg"      data-sessions="L"     onclick="setFilter(this)">腿</button>
    <button class="pill" data-f="mgroup" data-v="core"     data-sessions="L,P"   onclick="setFilter(this)">核心</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input class="search-box" type="text" id="searchInput" placeholder="搜尋肌肉或動作名稱…" oninput="doSearch(this.value)">
  </div>
</div>

<div class="content" id="content"></div>

  {label:'B1 / W1-8 / Day 3', type:'U', ex:['arm_lat_pull','pullup','pendlay','machine_high_row','face_pull','rev_ez_curl','sup_ez_curl','preacher_curl']},
  {label:'B1 / W1-8 / Day 4', type:'L', ex:['deadlift','front_squat','cable_pt','sl_leg_press','sl_leg_ext','swiss_curl','calf_raise_s']},
  {label:'B1 / W1-8 / Day 5', type:'P', ex:['cg_bench','military','db_incline','pec_deck','cable_lat','cable_kickback','bicycle_crunch']},
  {label:'B1 / W1-8 / Day 6', type:'U', ex:['neutral_pulldown','cable_elbow_out','cable_row','kn_pullover','snatch_shrug','cable_rev_fly','sa_cable_curl','hammer_curl']},
  {label:'B2 / W1 / Day 1',   type:'L', ex:['deadlift','tempo_squat','rdback_ext','sm_rev_lunge','ee_leg_ext','ee_leg_curl','lateral_band','tempo_calf']},
  {label:'B2 / W1 / Day 2',   type:'P', ex:['bench','arnold_press','cg_smith','lo_hi_cable_fly','floor_skull','egypt_lat','rope_tri_ext','hang_leg']},
  {label:'B2 / W1 / Day 3',   type:'U', ex:['arm_lat_pull','pullup','db_1arm_row','chest_tbar','lo_hi_rev_fly','rope_upright','db_sup_curl','spider_curl']},
  {label:'B2 / W2-8 / Day 4', type:'L', ex:['back_squat','rdl','pause_thrust','goblet_squat','seated_curl','cable_calf','calf_raise_s']},
  {label:'B2 / W2-8 / Day 5', type:'P', ex:['bench','mil_push_combo','slow_dip','triceps_vbar','machine_lat','plank']},
  {label:'B2 / W2-8 / Day 6', type:'U', ex:['sa_pulldown','seal_row','kn_pullover2','rev_pec_deck','a1_db_pron','a2_db_hammer','a3_db_sup']},
];

// 計算每個 mgroup 出現在哪些 session type
const MGROUP_SESSIONS = {};
GROUPS.forEach(g => {
  const sessions = new Set();
  g.muscles.forEach(m => {
    const info = MG_INFO[m]; if(!info) return;
    // find exercises that hit this muscle
    DAYS.forEach(dv => {
      dv.ex.forEach(ek => {
        const ex = EX[ek]; if(!ex) return;
        if([...ex.pri,...ex.sec].includes(m)) sessions.add(dv.type);
      });
    });
  });
  if(!MGROUP_SESSIONS[g.mg]) MGROUP_SESSIONS[g.mg] = new Set();
  sessions.forEach(s => MGROUP_SESSIONS[g.mg].add(s));
});

function buildMuscleMap(){
  const map={};
  DAYS.forEach(dv=>{
    dv.ex.forEach(ek=>{
      const ex=EX[ek]; if(!ex) return;
      function add(m,role){
        if(!map[m]) map[m]=[];
        const found=map[m].find(e=>e.key===ek);
        if(found){ if(!found.days.find(d=>d.label===dv.label)) found.days.push({label:dv.label,type:dv.type}); return; }
        map[m].push({key:ek,en:ex.en,zh:ex.zh,role,days:[{label:dv.label,type:dv.type}]});
      }
      ex.pri.forEach(m=>add(m,'pri'));
      ex.sec.forEach(m=>add(m,'sec'));
    });
  });
  return map;
}

let fSession='all', fMgroup='all', searchQ='';
const muscleMap=buildMuscleMap();

function updateMgroupPills(){
  document.querySelectorAll('[data-f="mgroup"]').forEach(btn=>{
    const v = btn.dataset.v;
    if(v==='all'){ btn.classList.remove('hidden-pill'); return; }
    if(fSession==='all'){
      btn.classList.remove('hidden-pill');
    } else {
      const sessions = MGROUP_SESSIONS[v];
      if(sessions && sessions.has(fSession)){
        btn.classList.remove('hidden-pill');
      } else {
        btn.classList.add('hidden-pill');
        // reset mgroup if current selection is now hidden
        if(fMgroup===v){ fMgroup='all'; document.querySelectorAll('[data-f="mgroup"]').forEach(b=>b.classList.remove('on-mgroup')); document.querySelector('[data-f="mgroup"][data-v="all"]').classList.add('on-mgroup'); }
      }
    }
  });
}

function setFilter(btn){
  const f=btn.dataset.f, v=btn.dataset.v;
  if(f==='session'){
    document.querySelectorAll('[data-f="session"]').forEach(b=>b.classList.remove('on-session'));
    btn.classList.add('on-session');
    fSession=v;
    updateMgroupPills();
  } else {
    document.querySelectorAll('[data-f="mgroup"]').forEach(b=>b.classList.remove('on-mgroup'));
    btn.classList.add('on-mgroup');
    fMgroup=v;
  }
  render();
}
function doSearch(q){ searchQ=q.trim(); render(); }

function render(){
  const content=document.getElementById('content');
  content.innerHTML='';
  let totalVisible=0;

  GROUPS.forEach(g=>{
    if(fMgroup!=='all' && g.mg!==fMgroup) return;

    const visibleMuscles=g.muscles.filter(m=>{
      const info=MG_INFO[m]; if(!info) return false;
      if(fSession!=='all' && info.cat!==fSession){
        // still show if session-type exercises hit this muscle as sec
        const anyHit = DAYS.filter(d=>fSession==='all'||d.type===fSession).some(dv=>
          dv.ex.some(ek=>{ const ex=EX[ek]; return ex&&([...ex.pri,...ex.sec].includes(m)); })
        );
        if(!anyHit) return false;
      }
      const exList=muscleMap[m]||[]; if(!exList.length) return false;
      if(searchQ){
        const q=searchQ.toLowerCase();
        const inM=info.zh.includes(q)||m.includes(q);
        const inEx=exList.some(e=>e.en.toLowerCase().includes(q)||e.zh.includes(q));
        if(!inM&&!inEx) return false;
      }
      return true;
    });
    if(!visibleMuscles.length) return;
    totalVisible+=visibleMuscles.length;

    const sec=document.createElement('div');
    sec.className='group-section';
    const safeId='g_'+g.label.replace(/[^a-z0-9]/gi,'_');
    sec.innerHTML=`<div class="group-title">${g.label}</div><div class="muscle-grid" id="${safeId}"></div>`;
    content.appendChild(sec);
    const grid=sec.querySelector('.muscle-grid');

    visibleMuscles.forEach(m=>{
      const info=MG_INFO[m];
      let exList=muscleMap[m]||[];
      if(fSession!=='all'){
        exList=exList.map(e=>({...e,days:e.days.filter(d=>d.type===fSession)})).filter(e=>e.days.length>0);
      }
      let filteredEx=exList;
      if(searchQ){
        const q=searchQ.toLowerCase();
        filteredEx=exList.filter(e=>e.en.toLowerCase().includes(q)||e.zh.includes(q)||info.zh.includes(q));
      }
      if(!filteredEx.length) return;

      const catColor=info.cat==='L'?'#22A55B':info.cat==='P'?'#E07020':'#3A9BDC';
      const priC=filteredEx.filter(e=>e.role==='pri').length;
      const secC=filteredEx.filter(e=>e.role==='sec').length;
      const countStr=(priC?`主${priC} `:'')+(secC?`協${secC}`:'');

      const card=document.createElement('div');
      card.className='muscle-card';
      const exHtml=filteredEx.map(e=>{
        const sorted=[...e.days].sort((a,b)=>a.label.localeCompare(b.label));
        const dayTags=sorted.map(d=>`<span class="loc-tag loc-${d.type}">${d.label}</span>`).join('');
        const roleBadge=`<span class="role-badge ${e.role==='pri'?'role-pri':'role-sec'}">${e.role==='pri'?'主要':'協同'}</span>`;
        return `<div class="ex-row">
          <div class="ex-name">${e.en}<span class="ex-zh">${e.zh}</span></div>
          ${roleBadge}
          <div class="loc-tags">${dayTags}</div>
        </div>`;
      }).join('');

      card.innerHTML=`<div class="muscle-hd" onclick="toggle(this)">
        <span class="muscle-dot" style="background:${catColor}"></span>
        <span class="muscle-name">${info.zh}</span>
        <span class="ex-count">${countStr}</span>
        <span class="chevron">&#9658;</span>
      </div><div class="ex-list">${exHtml}</div>`;
      grid.appendChild(card);
    });
  });

  if(!totalVisible){
    content.innerHTML='<div class="empty">找不到符合的結果</div>';
  }
}

function toggle(hd){
  const l=hd.nextElementSibling, c=hd.querySelector('.chevron');
  l.classList.toggle('open'); c.classList.toggle('open');
}

render();
</script>
