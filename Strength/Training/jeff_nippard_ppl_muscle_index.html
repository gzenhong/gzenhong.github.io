<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff Nippard PPL — 肌肉動作索引</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--s1:#181818;--s2:#222;--s3:#2a2a2a;
  --border:#2e2e2e;--text:#e4e4e4;--muted:#888;--dim:#555;
  --legs:#22A55B;--push:#E07020;--pull:#3A9BDC;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',system-ui,sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}

.header{padding:24px 28px 16px;border-bottom:1px solid var(--border);}
.header h1{font-size:20px;font-weight:500;letter-spacing:.5px;margin-bottom:3px;}
.header p{font-size:11px;color:var(--muted);}

.legend{display:flex;flex-wrap:wrap;gap:14px;padding:10px 28px;border-bottom:1px solid var(--border);}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ld{width:6px;height:6px;border-radius:50%;}
.badge-demo{font-size:10px;padding:1px 7px;border-radius:10px;}

.filters{padding:14px 28px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-label{font-size:11px;color:var(--muted);min-width:46px;letter-spacing:.5px;}

.pill{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{color:var(--text);border-color:#555;}
.pill.hidden-pill{display:none;}

/* session multi-select — colour per type */
.pill[data-f="session"][data-v="all"].active {background:var(--s3);color:var(--text);border-color:#666;}
.pill[data-f="session"][data-v="L"].active   {background:rgba(34,165,91,.13);color:var(--legs);border-color:rgba(34,165,91,.45);}
.pill[data-f="session"][data-v="P"].active   {background:rgba(224,112,32,.13);color:var(--push);border-color:rgba(224,112,32,.45);}
.pill[data-f="session"][data-v="U"].active   {background:rgba(58,155,220,.13);color:var(--pull);border-color:rgba(58,155,220,.45);}
/* implied (auto from mgroup) — dashed */
.pill[data-f="session"][data-v="L"].implied  {background:rgba(34,165,91,.05);color:rgba(34,165,91,.65);border-color:rgba(34,165,91,.3);border-style:dashed;}
.pill[data-f="session"][data-v="P"].implied  {background:rgba(224,112,32,.05);color:rgba(224,112,32,.65);border-color:rgba(224,112,32,.3);border-style:dashed;}
.pill[data-f="session"][data-v="U"].implied  {background:rgba(58,155,220,.05);color:rgba(58,155,220,.65);border-color:rgba(58,155,220,.3);border-style:dashed;}

.pill[data-f="mgroup"].active{background:var(--s3);color:var(--text);border-color:#666;}
.pill[data-f="role"][data-v="all"].active{background:var(--s3);color:var(--text);border-color:#666;}
.pill[data-f="role"][data-v="pri"].active{background:rgba(58,155,220,.13);color:#3A9BDC;border-color:rgba(58,155,220,.45);}
.pill[data-f="role"][data-v="sec"].active{background:var(--s3);color:var(--muted);border-color:#666;}

/* coloured micro-dots on mgroup pills */
.pill-dots{display:inline-flex;gap:2px;margin-left:5px;vertical-align:middle;}
.pdot{width:5px;height:5px;border-radius:50%;display:inline-block;}
.pdot-L{background:var(--legs);}.pdot-P{background:var(--push);}.pdot-U{background:var(--pull);}

.search-wrap{position:relative;}
.search-box{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;background:var(--s1);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
.search-box:focus{border-color:#555;}
.search-box::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}

.filter-summary{font-size:11px;color:var(--muted);padding:7px 28px 0;min-height:22px;}
.filter-summary span{color:var(--text);}

.content{padding:18px 28px 40px;}
.group-section{margin-bottom:1.4rem;}
.group-title{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.muscle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:8px;}

.muscle-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.muscle-hd{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;user-select:none;transition:background .1s;}
.muscle-hd:hover{background:var(--s2);}
.muscle-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.muscle-name{font-size:13px;font-weight:500;flex:1;}
.ex-count{font-size:10px;color:var(--dim);margin-left:auto;margin-right:8px;white-space:nowrap;}
.chevron{font-size:10px;color:var(--dim);transition:transform .2s;}
.chevron.open{transform:rotate(90deg);}

.ex-list{display:none;padding:0 13px 10px;}
.ex-list.open{display:block;}
.ex-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:5px;padding:8px 0;border-top:1px solid #1e1e1e;}
.ex-name{font-size:12px;flex:1;min-width:130px;line-height:1.4;}
.ex-zh{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
.role-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.role-pri{background:rgba(58,155,220,.12);color:#3A9BDC;border:1px solid rgba(58,155,220,.25);}
.role-sec{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.loc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;width:100%;}
.loc-tag{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;white-space:nowrap;}
.loc-L{border-color:rgba(34,165,91,.4);color:#22A55B;background:rgba(34,165,91,.07);}
.loc-P{border-color:rgba(224,112,32,.4);color:#E07020;background:rgba(224,112,32,.07);}
.loc-U{border-color:rgba(58,155,220,.4);color:#3A9BDC;background:rgba(58,155,220,.07);}
.empty{text-align:center;color:var(--dim);padding:3rem;font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <h1>Jeff Nippard PPL — 肌肉動作索引</h1>
  <p>兩列均支援多選。選肌肉類 → 自動帶出相關訓練類（虛線）；也可直接選訓練類縮小範圍。</p>
</div>

<div class="legend">
  <div class="li"><span class="ld" style="background:#22A55B"></span>腿部 L</div>
  <div class="li"><span class="ld" style="background:#E07020"></span>推系 P</div>
  <div class="li"><span class="ld" style="background:#3A9BDC"></span>拉系 U</div>
  <div class="li" style="margin-left:8px;">
    <span class="badge-demo" style="background:rgba(58,155,220,.12);color:#3A9BDC;border:1px solid rgba(58,155,220,.25);">主要</span>&thinsp;主要肌群
  </div>
  <div class="li">
    <span class="badge-demo" style="background:#2a2a2a;color:#888;border:1px solid #2e2e2e;">協同</span>&thinsp;協同肌群
  </div>
  <div class="li" style="color:var(--dim);">虛線框 = 由肌肉類自動帶入</div>
</div>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">訓練類</span>
    <button class="pill" data-f="session" data-v="all" onclick="toggleSession(this)">全部</button>
    <button class="pill" data-f="session" data-v="L"   onclick="toggleSession(this)">腿部</button>
    <button class="pill" data-f="session" data-v="P"   onclick="toggleSession(this)">推系</button>
    <button class="pill" data-f="session" data-v="U"   onclick="toggleSession(this)">拉系</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">肌肉類</span>
    <button class="pill" data-f="mgroup" data-v="all"      onclick="toggleMgroup(this)">全部</button>
    <button class="pill" data-f="mgroup" data-v="chest"    onclick="toggleMgroup(this)">胸</button>
    <button class="pill" data-f="mgroup" data-v="back"     onclick="toggleMgroup(this)">背</button>
    <button class="pill" data-f="mgroup" data-v="shoulder" onclick="toggleMgroup(this)">肩</button>
    <button class="pill" data-f="mgroup" data-v="bicep"    onclick="toggleMgroup(this)">二頭</button>
    <button class="pill" data-f="mgroup" data-v="tricep"   onclick="toggleMgroup(this)">三頭</button>
    <button class="pill" data-f="mgroup" data-v="forearm"  onclick="toggleMgroup(this)">前臂</button>
    <button class="pill" data-f="mgroup" data-v="leg"      onclick="toggleMgroup(this)">腿</button>
    <button class="pill" data-f="mgroup" data-v="core"     onclick="toggleMgroup(this)">核心</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">角色</span>
    <button class="pill active" data-f="role" data-v="all" onclick="toggleRole(this)">全部</button>
    <button class="pill"        data-f="role" data-v="pri" onclick="toggleRole(this)">主要肌群</button>
    <button class="pill"        data-f="role" data-v="sec" onclick="toggleRole(this)">協同肌群</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input class="search-box" type="text" placeholder="搜尋肌肉或動作名稱…" oninput="doSearch(this.value)">
  </div>
</div>

<div class="filter-summary" id="summary"></div>
<div class="content" id="content"></div>

  rope_upright:{en:'Rope Upright Row',zh:'繩索直立划船',pri:['trapu','mdelt'],sec:['serratus']},
  db_sup_curl:{en:'DB Supinated Curl',zh:'啞鈴旋後彎舉',pri:['bi'],sec:['brac']},
  spider_curl:{en:'Spider Curl',zh:'蜘蛛彎舉',pri:['bish'],sec:['brac']},
  a1_db_pron:{en:'DB Pronated Curl',zh:'啞鈴旋前彎舉',pri:['brad'],sec:['bi']},
  a2_db_hammer:{en:'DB Hammer Curl',zh:'啞鈴鎚式彎舉',pri:['brad'],sec:['bi','brac']},
  a3_db_sup:{en:'DB Supinated Curl (A3)',zh:'啞鈴旋後彎舉',pri:['bi'],sec:['brac']},
};
const DAYS=[
  {label:'B1 / W1-8 / Day 1',type:'L',ex:['back_squat','deadlift','hip_thrust','walking_lunge','leg_ext','seated_curl','calf_raise_s']},
  {label:'B1 / W1-8 / Day 2',type:'P',ex:['bench','db_sh_press','weighted_dip','lo_hi_cable_fly','skull_crusher','db_lat_raise','ab_wheel']},
  {label:'B1 / W1-8 / Day 3',type:'U',ex:['arm_lat_pull','pullup','pendlay','machine_high_row','face_pull','rev_ez_curl','sup_ez_curl','preacher_curl']},
  {label:'B1 / W1-8 / Day 4',type:'L',ex:['deadlift','front_squat','cable_pt','sl_leg_press','sl_leg_ext','swiss_curl','calf_raise_s']},
  {label:'B1 / W1-8 / Day 5',type:'P',ex:['cg_bench','military','db_incline','pec_deck','cable_lat','cable_kickback','bicycle_crunch']},
  {label:'B1 / W1-8 / Day 6',type:'U',ex:['neutral_pulldown','cable_elbow_out','cable_row','kn_pullover','snatch_shrug','cable_rev_fly','sa_cable_curl','hammer_curl']},
  {label:'B2 / W1 / Day 1',  type:'L',ex:['deadlift','tempo_squat','rdback_ext','sm_rev_lunge','ee_leg_ext','ee_leg_curl','lateral_band','tempo_calf']},
  {label:'B2 / W1 / Day 2',  type:'P',ex:['bench','arnold_press','cg_smith','lo_hi_cable_fly','floor_skull','egypt_lat','rope_tri_ext','hang_leg']},
  {label:'B2 / W1 / Day 3',  type:'U',ex:['arm_lat_pull','pullup','db_1arm_row','chest_tbar','lo_hi_rev_fly','rope_upright','db_sup_curl','spider_curl']},
  {label:'B2 / W2-8 / Day 4',type:'L',ex:['back_squat','rdl','pause_thrust','goblet_squat','seated_curl','cable_calf','calf_raise_s']},
  {label:'B2 / W2-8 / Day 5',type:'P',ex:['bench','mil_push_combo','slow_dip','triceps_vbar','machine_lat','plank']},
  {label:'B2 / W2-8 / Day 6',type:'U',ex:['sa_pulldown','seal_row','kn_pullover2','rev_pec_deck','a1_db_pron','a2_db_hammer','a3_db_sup']},
];

// Pre-compute which sessions each mgroup touches
const MGROUP_SESSIONS={};
GROUPS.forEach(g=>{
  if(!MGROUP_SESSIONS[g.mg]) MGROUP_SESSIONS[g.mg]=new Set();
  g.muscles.forEach(m=>{
    DAYS.forEach(dv=>{
      dv.ex.forEach(ek=>{
        const ex=EX[ek]; if(!ex) return;
        if([...ex.pri,...ex.sec].includes(m)) MGROUP_SESSIONS[g.mg].add(dv.type);
      });
    });
  });
});

// Build muscle→exercise map
function buildMuscleMap(){
  const map={};
  DAYS.forEach(dv=>{
    dv.ex.forEach(ek=>{
      const ex=EX[ek]; if(!ex) return;
      function add(m,role){
        if(!map[m]) map[m]=[];
        const found=map[m].find(e=>e.key===ek);
        if(found){if(!found.days.find(d=>d.label===dv.label)) found.days.push({label:dv.label,type:dv.type});return;}
        map[m].push({key:ek,en:ex.en,zh:ex.zh,role,days:[{label:dv.label,type:dv.type}]});
      }
      ex.pri.forEach(m=>add(m,'pri'));
      ex.sec.forEach(m=>add(m,'sec'));
    });
  });
  return map;
}
const muscleMap=buildMuscleMap();

// ── STATE ──
let selSessions=new Set(); // explicitly selected sessions
let selMgroups=new Set();  // explicitly selected mgroups
let impliedSess=new Set(); // auto-derived from mgroup selection
let selRole='all';         // 'all' | 'pri' | 'sec'
let searchQ='';

function recomputeImplied(){
  impliedSess=new Set();
  if(selMgroups.size>0){
    selMgroups.forEach(mg=>(MGROUP_SESSIONS[mg]||new Set()).forEach(s=>impliedSess.add(s)));
    selSessions.forEach(s=>impliedSess.delete(s)); // don't double-show explicit
  }
}

function effectiveSessions(){
  recomputeImplied();
  const combined=new Set([...selSessions,...impliedSess]);
  return combined.size===0 ? new Set(['L','P','U']) : combined;
}

function refreshUI(){
  recomputeImplied();
  // Session pills
  document.querySelectorAll('[data-f="session"]').forEach(btn=>{
    const v=btn.dataset.v;
    btn.classList.remove('active','implied');
    if(v==='all'){if(selSessions.size===0&&selMgroups.size===0) btn.classList.add('active');}
    else if(selSessions.has(v)) btn.classList.add('active');
    else if(impliedSess.has(v)) btn.classList.add('implied');
  });

  // Mgroup pills — always show all, dim those with no overlap with current session filter
  document.querySelectorAll('[data-f="mgroup"]').forEach(btn=>{
    const v=btn.dataset.v;
    btn.classList.remove('active','hidden-pill');
    if(v==='all'){if(selMgroups.size===0) btn.classList.add('active');return;}
    const mgS=MGROUP_SESSIONS[v]||new Set();
    if(selMgroups.has(v)) btn.classList.add('active');

    // Session-colour dots
    if(!btn.querySelector('.pill-dots')){
      let dots='<span class="pill-dots">';
      ['L','P','U'].forEach(s=>{if(mgS.has(s)) dots+=`<span class="pdot pdot-${s}"></span>`;});
      dots+='</span>';
      btn.innerHTML=btn.textContent.trim()+dots;
    }
  });

  // Summary bar
  const sNames={L:'腿部',P:'推系',U:'拉系'};
  const mNames={chest:'胸',back:'背',shoulder:'肩',bicep:'二頭',tricep:'三頭',forearm:'前臂',leg:'腿',core:'核心'};
  const parts=[];
  if(selMgroups.size>0) parts.push('肌肉：<span>'+[...selMgroups].map(v=>mNames[v]).join(' + ')+'</span>');
  if(selSessions.size>0) parts.push('訓練：<span>'+[...selSessions].map(v=>sNames[v]).join(' + ')+'</span>');
  else if(impliedSess.size>0) parts.push('自動帶入訓練類：<span>'+[...impliedSess].map(v=>sNames[v]).join(' + ')+'</span>');
  document.getElementById('summary').innerHTML=parts.length?'篩選中：'+parts.join('　'):'';
}

function toggleSession(btn){
  const v=btn.dataset.v;
  if(v==='all') selSessions.clear();
  else selSessions.has(v)?selSessions.delete(v):selSessions.add(v);
  refreshUI(); render();
}
function toggleMgroup(btn){
  const v=btn.dataset.v;
  if(v==='all') selMgroups.clear();
  else selMgroups.has(v)?selMgroups.delete(v):selMgroups.add(v);
  refreshUI(); render();
}
function toggleRole(btn){
  selRole=btn.dataset.v;
  document.querySelectorAll('[data-f="role"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function doSearch(q){searchQ=q.trim();render();}

function render(){
  const content=document.getElementById('content');
  content.innerHTML='';
  let total=0;
  const eff=effectiveSessions();

  GROUPS.forEach(g=>{
    if(selMgroups.size>0&&!selMgroups.has(g.mg)) return;
    const vis=g.muscles.filter(m=>{
      const info=MG_INFO[m]; if(!info) return false;
      const relevantDays=DAYS.filter(d=>eff.has(d.type));
      const hit=relevantDays.some(dv=>dv.ex.some(ek=>{
        const ex=EX[ek]; if(!ex) return false;
        if(selRole==='pri') return ex.pri.includes(m);
        if(selRole==='sec') return ex.sec.includes(m);
        return [...ex.pri,...ex.sec].includes(m);
      }));
      if(!hit) return false;
      if(searchQ){
        const q=searchQ.toLowerCase();
        return info.zh.includes(q)||m.includes(q)||(muscleMap[m]||[]).some(e=>e.en.toLowerCase().includes(q)||e.zh.includes(q));
      }
      return true;
    });
    if(!vis.length) return;
    total+=vis.length;

    const sec=document.createElement('div');
    sec.className='group-section';
    sec.innerHTML=`<div class="group-title">${g.label}</div><div class="muscle-grid"></div>`;
    content.appendChild(sec);
    const grid=sec.querySelector('.muscle-grid');

    vis.forEach(m=>{
      const info=MG_INFO[m];
      let exList=(muscleMap[m]||[]).map(e=>({...e,days:e.days.filter(d=>eff.has(d.type))})).filter(e=>e.days.length>0);
      // apply role filter
      if(selRole!=='all') exList=exList.filter(e=>e.role===selRole);
      if(searchQ){const q=searchQ.toLowerCase();exList=exList.filter(e=>e.en.toLowerCase().includes(q)||e.zh.includes(q)||info.zh.includes(q));}
      if(!exList.length) return;

      const cc=info.cat==='L'?'#22A55B':info.cat==='P'?'#E07020':'#3A9BDC';
      const priC=exList.filter(e=>e.role==='pri').length;
      const secC=exList.filter(e=>e.role==='sec').length;
      const cnt=(priC?`主${priC} `:'')+(secC?`協${secC}`:'');

      const card=document.createElement('div');
      card.className='muscle-card';
      const rows=exList.map(e=>{
        const tags=[...e.days].sort((a,b)=>a.label.localeCompare(b.label)).map(d=>`<span class="loc-tag loc-${d.type}">${d.label}</span>`).join('');
        const rb=`<span class="role-badge ${e.role==='pri'?'role-pri':'role-sec'}">${e.role==='pri'?'主要':'協同'}</span>`;
        return `<div class="ex-row"><div class="ex-name">${e.en}<span class="ex-zh">${e.zh}</span></div>${rb}<div class="loc-tags">${tags}</div></div>`;
      }).join('');
      card.innerHTML=`<div class="muscle-hd" onclick="toggle(this)"><span class="muscle-dot" style="background:${cc}"></span><span class="muscle-name">${info.zh}</span><span class="ex-count">${cnt}</span><span class="chevron">&#9658;</span></div><div class="ex-list">${rows}</div>`;
      grid.appendChild(card);
    });
  });
  if(!total) content.innerHTML='<div class="empty">找不到符合的結果</div>';
}

function toggle(hd){
  const l=hd.nextElementSibling,c=hd.querySelector('.chevron');
  l.classList.toggle('open');c.classList.toggle('open');
}

refreshUI(); render();
</script>
</body>
</html>
